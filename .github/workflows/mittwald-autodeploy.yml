# mittwald Auto-Deploy Workflow
# This workflow was automatically created by the mittwald extension.
#
# The workflow authenticates with mittwald using MITTWALD_DEPLOY_KEY and
# MITTWALD_DEPLOY_CONFIG_ID secrets, then makes the token available for
# your deployment steps.

name: Deploy to mittwald

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: p-sr0t8w
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Authenticate with mittwald
        id: authenticate
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.MITTWALD_DEPLOY_CONFIG_ID }}:${{ secrets.MITTWALD_DEPLOY_KEY }}" \
            https://oowmlikzhwwu.shares.zrok.io/api/deployment/authenticate)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "Authentication failed with status $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi
          
          TOKEN=$(echo "$BODY" | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to extract token from response"
            echo "Response: $BODY"
            exit 1
          fi
          
          echo "MITTWALD_TOKEN=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Mittwald Container Hosting
        uses: mittwald/rp-container-deploy-action@master
        with:
          mittwald-api-token: ${{ steps.authenticate.outputs.MITTWALD_TOKEN }}
          mittwald-project-id: p-sr0t8w
